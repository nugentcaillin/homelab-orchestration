networks:
  shared:
    external: true
    name: proxy-bridge 
services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=80
      - TORRENTING_PORT=6881
    volumes:
      - ./qbittorrent/config:/config
      - /srv/media-server/torrents:/data/torrents
    restart: 'unless-stopped'
    networks:
     - shared 
