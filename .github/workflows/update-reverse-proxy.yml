name: Update reverse proxy
on: 
  push:
    paths:
      - 'nginx/**'
jobs:
  pull_repository:
    uses: ./.github/workflows/push_to_server.yml
    secrets: inherit
  deploy_container:
    runs-on: ubuntu-latest
    steps:
      - uses: nugentcaillin/actions/cloudflared-ssh@main
        with:
          id: ${{secrets.CF_ACCESS_CLIENT_ID}}
          secret: ${{secrets.CF_ACCESS_CLIENT_SECRET}}
          key: ${{secrets.DEPLOY_BOT_PRIVATE_KEY}}
          user: ${{secrets.DEPLOY_BOT_USER}}
          host: ${{secrets.DEPLOY_BOT_HOST}}
          script: |
            cd /opt/infra/homelab-orchestration/personal-site
            docker compose pull
            docker compose up -d --remove-orphans
            docker exec reverse-proxy nginx -s reload
