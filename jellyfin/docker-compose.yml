networks:
  shared:
    external: true
    name: proxy-bridge 
services:
  jellyfin:
    container_name: jellyfin
    image: jellyfin/jellyfin
    volumes:
      - ./config:/config
      - ./cache:/cache
      - type: bind
        source: /media
        target: /media
    restart: 'unless-stopped'
    networks:
     - shared
    environment: 
    - JELLYFIN_PublishedServerUrl=${JELLYFIN_SERVER_URL}
 
