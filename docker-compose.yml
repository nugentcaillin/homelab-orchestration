networks:
  proxy:
    driver: bridge

services:
  reverse-proxy:
    container_name: reverse-proxy
    image: nginx:1.29.5
    ports:
      - "80:80"
      - "443:443"
      - "3306:3306"
    volumes:
      - "./nginx/config:/etc/nginx/conf.d:ro"
      - "./nginx/stream-config:/etc/nginx/stream.conf.d:ro"
      - "/var/www/certbot:/var/www/certbot:ro"
      - "/etc/letsencrypt:/etc/letsencrypt:ro"
      - "/var/log/nginx:/var/log/nginx"
      - "./nginx/nginx.conf:/etc/nginx/nginx.conf:ro"
    networks:
      - proxy

  hello-world:
    container_name: hello-world
    image: traefik/whoami
    networks:
      - proxy

  medhack-frontiers-db:
    container_name: medhack-frontiers-db-prod
    image: mysql:8.4.8
    environment:
      - MYSQL_ROOT_PASSWORD=${MEDHACK_FRONTIERS_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=medHackFrontiersDBprod
    volumes:
      - "./medhack-frontiers-db/prod:/var/lib/mysql"
    networks:
      - proxy

  medhack-frontiers-db-staging:
    container_name: medhack-frontiers-db-staging
    image: mysql:8.4.8
    environment:
      - MYSQL_ROOT_PASSWORD=${MEDHACK_FRONTIERS_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=medHackFrontiersDBstaging
    volumes:
      - "./medhack-frontiers-db/staging:/var/lib/mysql"
    networks:
      - proxy

  medhack-frontend:
    container_name: medhack-frontend
    image: caillinnugent/medhack-frontend:${FRONTEND_TAG}
    networks:
      - proxy

  medhack-backend:
    container_name: medhack-backend
    image: caillinnugent/medhack-backend:${BACKEND_TAG}
    networks:
      - proxy
  
  jellyfin:
    container_name: jellyfin
    image: jellyfin/jellyfin
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - type: bind
        source: /media
        target: /media
    restart: 'unless-stopped'
    networks:
      - proxy
    environment: 
    - JELLYFIN_PublishedServerUrl=${JELLYFIN_SERVER_URL}
  
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=80
      - TORRENTING_PORT=6881
    volumes:
      - ./qbittorrent/config:/config
      - /srv/media-server/torrents:/data/torrents
    restart: 'unless-stopped'
    networks:
      - proxy
  
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /path/to/sonarr/data:/config
      - /path/to/tvseries:/tv #optional
      - /path/to/downloadclient-downloads:/downloads #optional
    ports:
      - 8989:8989
    restart: unless-stopped
  
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /path/to/lidarr/config:/config
      - /path/to/music:/music #optional
      - /path/to/downloads:/downloads #optional
    ports:
      - 8686:8686
    restart: unless-stopped
  
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /path/to/radarr/data:/config
      - /path/to/movies:/movies #optional
      - /path/to/download-client-downloads:/downloads #optional
    ports:
      - 7878:7878
    restart: unless-stopped