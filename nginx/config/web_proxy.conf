server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;



    location /.well-known/acme-challenge/ {
        root /var/www/certbot/;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# medhack frontend
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name medhack.caillin.dev;

    ssl_certificate /etc/letsencrypt/live/medhack.caillin.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medhack.caillin.dev/privkey.pem; 
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass http://medhack-frontend:3000;
    }

}

# medhack backend
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.medhack.caillin.dev;
    
    ssl_certificate /etc/letsencrypt/live/api.medhack.caillin.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.medhack.caillin.dev/privkey.pem; 
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /;
        proxy_pass http://medhack-backend:8080;
    }

}


# caillin.net
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name caillin.dev;
    ssl_certificate /etc/letsencrypt/live/caillin.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caillin.dev/privkey.pem; 
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;


    location = /whoami {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass http://hello-world:80;
    }


    location /docs/ {
	alias /opt/infra/homelab-orchestration/docs/;
	index index.html;
	try_files $uri $uri/ =404;
    }
}






# jellyfin
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    http2 on;

    server_name media.caillin.dev;
    client_max_body_size 20M;


    ssl_certificate /etc/letsencrypt/live/media.caillin.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media.caillin.dev/privkey.pem; 
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Content-Type-Options "nosniff";
    add_header Content-Security-Policy "default-src https: data: blob: ; img-src 'self' https://* ; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.youtube.com blob:; worker-src 'self' blob:; connect-src 'self'; object-src 'none'; font-src 'self'";

    location / {
        # Proxy main Jellyfin traffic
        proxy_pass http://jellyfin:8096;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Protocol $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        # Disable buffering when the nginx proxy gets very resource heavy upon streaming
        proxy_buffering off;
    }

    location /socket {
        # Proxy Jellyfin Websockets traffic
        proxy_pass http://jellyfin:8096;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Protocol $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }
}


